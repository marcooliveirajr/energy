# Pipeline GitLab – Projeto API MXM Databricks
# Integração: validar código e (opcional) sincronizar com workspace Databricks
# Variáveis necessárias em Settings → CI/CD → Variables:
#   DATABRICKS_HOST (ex.: https://adb-xxxxx.azuredatabricks.net)
#   DATABRICKS_TOKEN (PAT do Databricks) – mascarada

stages:
  - validate
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# Cache de dependências (opcional)
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .cache/pip

# ——— Validação (todo push / merge request) ———
validate:
  stage: validate
  image: python:3.10-slim
  before_script:
    - pip install --quiet pyyaml
  script:
    - python -m py_compile src/config/paths.py 2>/dev/null || true
    - echo "Estrutura do projeto:"
    - ls -la config src docs 2>/dev/null || true
    - echo "Validação concluída."
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

